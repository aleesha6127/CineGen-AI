{% extends "base.html" %}
{% block title %}Sign In — CineGen AI{% endblock %}

{% block body %}
<div class="auth-page">
    <div class="auth-bg">
        <div class="auth-glow auth-glow-1"></div>
        <div class="auth-glow auth-glow-2"></div>
        <div class="hero-noise"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card glass-card">
            <a href="/" class="auth-logo">
                <span class="brand-icon">🎬</span>
                <span class="brand-name">CineGen <span class="brand-accent">AI</span></span>
            </a>
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Sign in to your creative studio</p>

            <div id="auth-error" class="auth-message auth-message-error hidden"></div>
            <div id="auth-success" class="auth-message auth-message-success hidden"></div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@studio.com" required autofocus />
                </div>
                <div class="form-group">
                    <div class="form-label-row">
                        <label for="password">Password</label>
                        <a href="#" class="form-link" id="forgot-password">Forgot password?</a>
                    </div>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required />
                </div>
                <button type="submit" class="btn btn-primary btn-full btn-glow" id="login-btn">
                    <span id="login-btn-text">Sign In</span>
                    <span id="login-spinner" class="btn-spinner hidden"></span>
                </button>
            </form>

            <div class="auth-divider"><span>or</span></div>

            <button class="btn btn-ghost btn-full btn-google" id="google-btn">
                <svg width="18" height="18" viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Continue with Google
            </button>

            <p class="auth-switch">Don't have an account? <a href="/register">Create one</a></p>
        </div>
    </div>
</div>

<script type="module">
    import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail }
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    document.addEventListener("authReady", async () => {
        const auth = window.__auth;
        const db = window.__db;
        const errDiv = document.getElementById("auth-error");
        const loginBtn = document.getElementById("login-btn");
        const loginBtnText = document.getElementById("login-btn-text");
        const loginSpinner = document.getElementById("login-spinner");

        function showError(msg) {
            errDiv.textContent = msg;
            errDiv.classList.remove("hidden");
            sucDiv.classList.add("hidden");
        }
        function showSuccess(msg) {
            sucDiv.textContent = msg;
            sucDiv.classList.remove("hidden");
            errDiv.classList.add("hidden");
        }
        function setLoading(state) {
            loginBtnText.classList.toggle("hidden", state);
            loginSpinner.classList.toggle("hidden", !state);
            loginBtn.disabled = state;
        }

        async function doSession(user) {
            const idToken = await user.getIdToken();
            await fetch("/api/auth/session", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ idToken, user: { uid: user.uid, email: user.email, displayName: user.displayName } })
            });
            window.location.href = "/dashboard";
        }

        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            errDiv.classList.add("hidden");
            setLoading(true);
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            try {
                const { user } = await signInWithEmailAndPassword(auth, email, password);
                await doSession(user);
            } catch (err) {
                const msgs = { "auth/user-not-found": "No account found with this email.", "auth/wrong-password": "Incorrect password.", "auth/too-many-requests": "Too many attempts. Please try again later.", "auth/invalid-credential": "Invalid email or password." };
                showError(msgs[err.code] || "Sign in failed. Please try again.");
                setLoading(false);
            }
        });

        document.getElementById("google-btn").addEventListener("click", async () => {
            const provider = new GoogleAuthProvider();
            try {
                setLoading(true);
                const { user } = await signInWithPopup(auth, provider);

                // Check if user exists in Firestore, if not create record
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (!userDoc.exists()) {
                    await setDoc(doc(db, "users", user.uid), {
                        uid: user.uid,
                        name: user.displayName || user.email.split('@')[0],
                        email: user.email,
                        role: "user",
                        created_at: serverTimestamp(),
                        scripts_count: 0,
                        ai_usage: 0
                    });
                }

                await doSession(user);
            } catch (err) {
                console.error("Google Auth Error:", err);
                const msgs = {
                    "auth/popup-blocked": "The sign-in popup was blocked. Please enable popups.",
                    "auth/operation-not-allowed": "Google sign-in is not enabled in the Firebase Console.",
                    "auth/popup-closed-by-user": "Sign-in was cancelled."
                };
                showError(msgs[err.code] || `Google sign-in failed: ${err.message}`);
                setLoading(false);
            }
        });

        document.getElementById("forgot-password").addEventListener("click", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            if (!email) {
                showError("Please enter your email address first.");
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                showSuccess("Password reset email sent! Check your inbox.");
            } catch (err) {
                showError("Could not send reset email. Please try again.");
            }
        });
    });
</script>
{% endblock %}
