{% extends "app_layout.html" %}
{% block title %}Settings — CineGen AI{% endblock %}
{% set active_page = 'settings' %}

{% block page_content %}

<div class="page-content">
    <div class="page-header">
        <h1 class="page-title">Settings</h1>
    </div>

    <div class="settings-layout">
        <div class="panel-card" style="max-width:600px;">
            <h2 class="panel-title">Profile</h2>
            <div id="settings-message" class="auth-message hidden"></div>
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" class="form-input" id="settings-name" value="{{ user.name or '' }}" />
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-input" id="settings-email" value="{{ user.email or '' }}" disabled />
            </div>
            <button class="btn btn-primary btn-glow" onclick="saveSettings()">Save Changes</button>
        </div>

        <div class="panel-card" style="max-width:600px;margin-top:1.5rem;">
            <h2 class="panel-title">Danger Zone</h2>
            <p style="color:var(--text-muted);margin-bottom:1rem;">Actions here are irreversible.</p>
            <button class="btn btn-danger" onclick="if(confirm('Sign out?')) window.__signOut()">Sign Out</button>
        </div>
    </div>
</div>
{% endblock %}

{% block page_scripts %}
<script type="module">
    import { updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window.saveSettings = async function () {
        const user = window.__currentUser;
        if (!user) return;
        const name = document.getElementById("settings-name").value.trim();
        try {
            await updateProfile(user, { displayName: name });
            await updateDoc(doc(window.__db, "users", user.uid), { name });
            showToast("Profile updated!", "success");
        } catch (e) { showToast("Error saving profile.", "error"); }
    };
</script>
{% endblock %}
